<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Comedor CEIP Juan XXIII</title>
<meta name="description" content="Gestión diaria del comedor escolar - CEIP Juan XXIII, Los Gallardos">
<meta name="theme-color" content="#E8743B">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="supabase.js"></script>
<script>
  function cargarScriptRespaldo(url, callback) {
    var s = document.createElement('script');
    s.src = url;
    s.onload = callback;
    s.onerror = callback;
    document.head.appendChild(s);
  }
  setTimeout(function() {
    if (typeof window.supabase === 'undefined') {
      cargarScriptRespaldo('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js', function() {
        if (typeof window.supabase === 'undefined') {
          cargarScriptRespaldo('https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js', function() {});
        }
      });
    }
  }, 800);
</script>

<style>
  :root {
    --crema: #FDF6EC;
    --crema-oscuro: #F5E9D6;
    --naranja: #E8743B;
    --naranja-oscuro: #C95F2B;
    --naranja-claro: #FBE3D3;
    --verde: #5FA85D;
    --verde-oscuro: #3F7A3D;
    --verde-claro: #E2F0E1;
    --amarillo: #F4B942;
    --amarillo-oscuro: #C9930F;
    --rojo: #D6543E;
    --rojo-oscuro: #B03E2A;
    --rojo-claro: #FBE2DD;
    --marron: #4A3526;
    --marron-suave: #7A6452;
    --azul: #3F7CAC;
    --azul-claro: #E1EEF6;
    --blanco: #FFFFFF;
    --sombra: 0 4px 14px rgba(74, 53, 38, 0.10);
    --sombra-fuerte: 0 8px 24px rgba(74, 53, 38, 0.16);
    --radio-sm: 12px;
    --radio-md: 18px;
    --radio-lg: 26px;
    --font-display: 'Baloo 2', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    font-family: var(--font-body);
    background: var(--crema);
    color: var(--marron);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, .display {
    font-family: var(--font-display);
    font-weight: 700;
    margin: 0;
    color: var(--marron);
  }

  button {
    font-family: var(--font-body);
    cursor: pointer;
    border: none;
    background: none;
  }

  input, select {
    font-family: var(--font-body);
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--crema);
    position: relative;
    padding-bottom: 2rem;
  }

  /* ===== PANTALLA INICIO ===== */
  .inicio {
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .inicio-cabecera {
    background: var(--naranja);
    padding: 3rem 1.5rem 4rem;
    border-radius: 0 0 50% 50% / 0 0 40px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .inicio-cabecera::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12) 0%, transparent 50%);
  }

  .bandeja-icono {
    width: 96px;
    height: 96px;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--blanco);
    border-radius: 50%;
    font-size: 48px;
    position: relative;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    overflow: hidden;
    z-index: 1;
  }

  .bandeja-icono img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .inicio-titulo {
    color: var(--blanco);
    font-size: 26px;
    line-height: 1.25;
    position: relative;
    z-index: 1;
  }

  .inicio-subtitulo {
    color: rgba(255,255,255,0.92);
    font-size: 14px;
    margin-top: 0.4rem;
    font-weight: 500;
    position: relative;
    z-index: 1;
  }

  .puertas {
    flex: 1;
    padding: 1.75rem 1.25rem 1rem;
    margin-top: -2.5rem;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    z-index: 2;
  }

  .puerta {
    background: var(--blanco);
    border-radius: var(--radio-lg);
    padding: 1.25rem 1.3rem;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--sombra);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    text-align: left;
    width: 100%;
  }

  .puerta:active {
    transform: scale(0.97);
  }

  .puerta-icono {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }

  .puerta-icono.familias { background: var(--verde-claro); }
  .puerta-icono.comedor { background: var(--amarillo); opacity: 0.95; }
  .puerta-icono.profesorado { background: #D4E8D4; }
  .puerta-icono.admin { background: var(--azul-claro); }
  .puerta-icono.instalar { background: var(--amarillo); opacity: 0.95; }

  .puerta-texto h3 {
    font-size: 18px;
    margin-bottom: 2px;
  }

  .puerta-texto p {
    font-size: 13px;
    color: var(--marron-suave);
    margin: 0;
    font-weight: 500;
  }

  .puerta-flecha {
    margin-left: auto;
    color: var(--marron-suave);
    font-size: 20px;
    flex-shrink: 0;
  }

  .pie-centro {
    text-align: center;
    padding: 1.5rem 1.5rem 0.5rem;
    font-size: 12px;
    color: var(--marron-suave);
    font-weight: 500;
  }

  /* ===== PANTALLAS GENERALES ===== */
  .pantalla {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .cabecera-simple {
    padding: 1.25rem 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-volver {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--blanco);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: var(--sombra);
    flex-shrink: 0;
    color: var(--marron);
  }

  .cabecera-simple h2 {
    font-size: 20px;
  }

  .contenido {
    flex: 1;
    padding: 0 1.25rem 1.5rem;
  }

  /* ===== LOGIN PIN ===== */
  .login-box {
    background: var(--blanco);
    border-radius: var(--radio-lg);
    padding: 2rem 1.5rem;
    box-shadow: var(--sombra);
    text-align: center;
    margin-top: 1rem;
  }

  .login-icono {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }

  .login-box.familias .login-icono { background: var(--verde-claro); }
  .login-box.comedor .login-icono { background: var(--amarillo); }
  .login-box.admin .login-icono { background: var(--azul-claro); }

  .login-box h2 { font-size: 20px; margin-bottom: 0.4rem; }
  .login-box p.ayuda { font-size: 13px; color: var(--marron-suave); font-weight: 500; margin-bottom: 1.5rem; }

  .pin-input {
    width: 100%;
    padding: 16px;
    font-size: 22px;
    text-align: center;
    letter-spacing: 6px;
    border: 2px solid var(--crema-oscuro);
    border-radius: var(--radio-md);
    background: var(--crema);
    color: var(--marron);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .pin-input:focus {
    outline: none;
    border-color: var(--naranja);
  }

  .btn-principal {
    width: 100%;
    padding: 16px;
    border-radius: var(--radio-md);
    font-size: 16px;
    font-weight: 700;
    color: var(--blanco);
    background: var(--naranja);
    box-shadow: 0 4px 0 var(--naranja-oscuro);
    transition: transform 0.1s ease;
  }

  .btn-principal:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--naranja-oscuro); }
  .btn-principal:disabled { opacity: 0.5; }

  .btn-principal.verde { background: var(--verde); box-shadow: 0 4px 0 var(--verde-oscuro); }
  .btn-principal.verde:active { box-shadow: 0 1px 0 var(--verde-oscuro); }
  .btn-principal.azul { background: var(--azul); box-shadow: 0 4px 0 #2c5d80; }
  .btn-principal.azul:active { box-shadow: 0 1px 0 #2c5d80; }

  .mensaje-error {
    background: var(--rojo-claro);
    color: var(--rojo-oscuro);
    padding: 12px;
    border-radius: var(--radio-sm);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 1rem;
    display: none;
  }

  .mensaje-error.visible { display: block; }

  /* ===== VISTA FAMILIAS: TARJETAS DE ALUMNO ===== */
  .fecha-actual {
    background: var(--blanco);
    border-radius: var(--radio-md);
    padding: 14px 16px;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--sombra);
  }

  .fecha-actual-icono {
    font-size: 24px;
  }

  .fecha-actual-texto {
    font-size: 15px;
    font-weight: 600;
    text-transform: capitalize;
  }

  .aviso-hora-limite {
    background: var(--rojo-claro);
    color: var(--rojo-oscuro);
    padding: 10px 14px;
    border-radius: var(--radio-sm);
    font-size: 12.5px;
    font-weight: 600;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tarjeta-alumno {
    background: var(--blanco);
    border-radius: var(--radio-lg);
    padding: 1.1rem 1.2rem;
    margin-bottom: 14px;
    box-shadow: var(--sombra);
  }

  .tarjeta-alumno-cabecera {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .avatar-alumno {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--naranja-claro);
    color: var(--naranja-oscuro);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
  }

  .tarjeta-alumno-nombre {
    font-weight: 700;
    font-size: 16px;
  }

  .tarjeta-alumno-clase {
    font-size: 12.5px;
    color: var(--marron-suave);
    font-weight: 600;
  }

  .toggle-comedor {
    display: flex;
    gap: 10px;
  }

  .opcion-toggle {
    flex: 1;
    padding: 14px 8px;
    border-radius: var(--radio-md);
    text-align: center;
    font-weight: 700;
    font-size: 14.5px;
    border: 2px solid var(--crema-oscuro);
    background: var(--crema);
    color: var(--marron-suave);
    transition: all 0.15s ease;
  }

  .opcion-toggle .emoji { font-size: 20px; display: block; margin-bottom: 4px; }

  .opcion-toggle.activa.si {
    background: var(--verde-claro);
    border-color: var(--verde);
    color: var(--verde-oscuro);
  }

  .opcion-toggle.activa.no {
    background: var(--rojo-claro);
    border-color: var(--rojo);
    color: var(--rojo-oscuro);
  }

  .estado-guardado {
    font-size: 11.5px;
    color: var(--verde-oscuro);
    font-weight: 600;
    margin-top: 10px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .estado-guardado.visible { opacity: 1; }

  .accion-rapida {
    background: var(--blanco);
    border: 2px dashed var(--crema-oscuro);
    border-radius: var(--radio-md);
    padding: 14px;
    text-align: center;
    font-weight: 600;
    font-size: 13.5px;
    color: var(--marron-suave);
    margin-bottom: 1.25rem;
    width: 100%;
  }

  .observaciones-alumno {
    background: var(--amarillo);
    opacity: 0.85;
    border-radius: var(--radio-sm);
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 600;
    color: #5c4308;
    margin-top: 10px;
  }

  /* ===== PANEL COMEDOR (STAFF) ===== */
  .resumen-staff {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .stat-card {
    background: var(--blanco);
    border-radius: var(--radio-md);
    padding: 16px;
    text-align: center;
    box-shadow: var(--sombra);
  }

  .stat-numero {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
    color: var(--naranja);
  }

  .stat-numero.verde { color: var(--verde); }

  .stat-label {
    font-size: 12px;
    color: var(--marron-suave);
    font-weight: 600;
    margin-top: 2px;
  }

  .grupo-clase {
    margin-bottom: 1.25rem;
  }

  .grupo-clase-titulo {
    font-size: 14px;
    font-weight: 700;
    color: var(--marron-suave);
    margin-bottom: 8px;
    padding-left: 4px;
    display: flex;
    justify-content: space-between;
  }

  .lista-staff {
    background: var(--blanco);
    border-radius: var(--radio-md);
    box-shadow: var(--sombra);
    overflow: hidden;
  }

  .fila-staff {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--crema-oscuro);
    font-size: 14.5px;
    font-weight: 600;
  }

  .fila-staff:last-child { border-bottom: none; }

  .punto-estado {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .punto-estado.si { background: var(--verde); }
  .punto-estado.no { background: var(--rojo); }
  .punto-estado.sin-marcar { background: var(--crema-oscuro); }

  .etiqueta-obs {
    margin-left: auto;
    font-size: 11px;
    background: var(--amarillo);
    padding: 2px 8px;
    border-radius: 8px;
    font-weight: 700;
    color: #5c4308;
  }

  .selector-fecha-staff {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.25rem;
    background: var(--blanco);
    border-radius: var(--radio-md);
    padding: 8px 10px;
    box-shadow: var(--sombra);
  }

  .selector-fecha-staff input[type="date"] {
    flex: 1;
    border: none;
    font-size: 15px;
    font-weight: 600;
    background: transparent;
    color: var(--marron);
    padding: 6px;
  }

  .btn-icono-pequeno {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--crema);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  /* ===== ADMIN ===== */
  .tabs-admin {
    display: flex;
    gap: 6px;
    margin-bottom: 1.25rem;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .tab-admin {
    padding: 10px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    background: var(--blanco);
    color: var(--marron-suave);
    white-space: nowrap;
    box-shadow: var(--sombra);
    flex-shrink: 0;
  }

  .tab-admin.activa {
    background: var(--azul);
    color: var(--blanco);
  }

  .seccion-admin { display: none; }
  .seccion-admin.visible { display: block; }

  .tarjeta-admin {
    background: var(--blanco);
    border-radius: var(--radio-md);
    padding: 1rem 1.1rem;
    margin-bottom: 12px;
    box-shadow: var(--sombra);
  }

  .form-grupo { margin-bottom: 12px; }

  .form-grupo label {
    display: block;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--marron-suave);
    margin-bottom: 6px;
  }

  .form-grupo input, .form-grupo select, .form-grupo textarea {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--crema-oscuro);
    border-radius: var(--radio-sm);
    font-size: 14.5px;
    background: var(--crema);
    color: var(--marron);
  }

  .form-grupo input:focus, .form-grupo select:focus, .form-grupo textarea:focus {
    outline: none;
    border-color: var(--azul);
  }

  .fila-lista-admin {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 0;
    border-bottom: 1px solid var(--crema-oscuro);
  }

  .fila-lista-admin:last-child { border-bottom: none; }

  .fila-lista-admin-info { flex: 1; min-width: 0; }
  .fila-lista-admin-nombre { font-weight: 700; font-size: 14.5px; }
  .fila-lista-admin-detalle { font-size: 12px; color: var(--marron-suave); font-weight: 500; }

  .btn-mini {
    padding: 7px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    background: var(--crema);
    color: var(--marron-suave);
    flex-shrink: 0;
  }

  .btn-mini.rojo { background: var(--rojo-claro); color: var(--rojo-oscuro); }
  .btn-mini.azul { background: var(--azul-claro); color: var(--azul); }

  .btn-secundario {
    width: 100%;
    padding: 13px;
    border-radius: var(--radio-md);
    font-size: 14px;
    font-weight: 700;
    background: var(--blanco);
    color: var(--naranja);
    border: 2px solid var(--naranja-claro);
    margin-bottom: 10px;
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid-3-botones { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  .pin-generado {
    background: var(--verde-claro);
    color: var(--verde-oscuro);
    padding: 10px 14px;
    border-radius: var(--radio-sm);
    font-weight: 700;
    font-size: 16px;
    text-align: center;
    letter-spacing: 3px;
    margin-top: 8px;
    display: none;
  }

  .pin-generado.visible { display: block; }

  .vacio-estado {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--marron-suave);
  }

  .vacio-estado .emoji-grande { font-size: 44px; margin-bottom: 10px; display: block; }
  .vacio-estado p { font-size: 13.5px; font-weight: 600; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--marron);
    color: var(--blanco);
    padding: 12px 20px;
    border-radius: 14px;
    font-size: 13.5px;
    font-weight: 600;
    box-shadow: var(--sombra-fuerte);
    z-index: 100;
    transition: transform 0.25s ease;
    max-width: 90%;
    text-align: center;
  }

  .toast.visible { transform: translateX(-50%) translateY(0); }

  .cargando {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--marron-suave);
    font-weight: 600;
    font-size: 14px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--crema-oscuro);
    border-top-color: var(--naranja);
    border-radius: 50%;
    margin: 0 auto 12px;
    animation: girar 0.8s linear infinite;
  }

  @keyframes girar { to { transform: rotate(360deg); } }

  .oculto { display: none !important; }

  .info-pin-actual {
    text-align: center;
    font-size: 12px;
    color: var(--marron-suave);
    font-weight: 600;
    margin-bottom: 1rem;
  }

  .checkbox-dias {
    display: flex;
    gap: 6px;
    margin-bottom: 1rem;
  }

  .dia-check {
    flex: 1;
    text-align: center;
    padding: 10px 4px;
    border-radius: 10px;
    background: var(--crema);
    border: 2px solid var(--crema-oscuro);
    font-size: 11.5px;
    font-weight: 700;
    color: var(--marron-suave);
  }

  .dia-check.activo {
    background: var(--naranja-claro);
    border-color: var(--naranja);
    color: var(--naranja-oscuro);
  }

  /* ===== GUÍA DE INSTALACIÓN ===== */
  .texto-intro-instalar {
    font-size: 13.5px;
    color: var(--marron-suave);
    font-weight: 500;
    line-height: 1.5;
    margin: 0.5rem 0 1.25rem;
  }

  .lista-pasos-instalar {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 1.25rem;
  }

  .paso-instalar {
    background: var(--blanco);
